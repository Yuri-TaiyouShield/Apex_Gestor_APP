services:
  apex-mysql:
    image: mysql:8.0
    container_name: apex-gestor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-apex_dev_2026}
      MYSQL_DATABASE: ${DB_NAME:-apex_db}
      TZ: America/Sao_Paulo
    ports:
      - "${DB_PORT:-2705}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=-03:00
    volumes:
      - apex_mysql_data:/var/lib/mysql
      - ./Apex_BD.sql:/docker-entrypoint-initdb.d/01-apex-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  apex-backend:
    build:
      context: ./Apex-Gestordemo
    container_name: apex-gestor-api
    restart: unless-stopped
    depends_on:
      apex-mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: apex-mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-apex_db}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-apex_dev_2026}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-with-at-least-32-bytes}
      PRIVACY_HASH_PEPPER: ${PRIVACY_HASH_PEPPER:-dev-only-change-this-privacy-pepper}
      APEX_LICENSE_KEYS: ${APEX_LICENSE_KEYS:-APEX-DEMO-2026}
      APEX_LICENSE_CATALOG: "${APEX_LICENSE_CATALOG:-APEX-DEMO-ALL|all|3|30;APEX-DEMO-DESKTOP|desktop|1|30;APEX-DEMO-EMPRESA|mobile-staff|1|30;APEX-DEMO-CLIENTE|mobile-client|1|30;APEX-DEMO-WEB|web-client|1|30;APEX-DEMO-DUO|desktop+mobile-staff|2|30;APEX-DEMO-TRIO|desktop+mobile-staff+web-client|3|30}"
      APEX_EMAIL_ENABLED: ${APEX_EMAIL_ENABLED:-false}
      APEX_EMAIL_FROM: ${APEX_EMAIL_FROM:-noreply@apexgestor.local}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

  apex-web:
    build:
      context: ./Apex_Gestor
    container_name: apex-gestor-web
    restart: unless-stopped
    depends_on:
      apex-backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  apex_mysql_data:
