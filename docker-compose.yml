services:
  apex-db:
    image: mysql:8.4
    container_name: apex-gestor-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: apex_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-apex_dev_password}
    ports:
      - "${DB_PORT:-2705}:3306"
    volumes:
      - apex_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  backend-api:
    build:
      context: ./Apex-Gestordemo
    container_name: apex-gestor-api
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://apex-db:3306/apex_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-apex_dev_password}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      APEX_SECURITY_REQUIRE_AUTH: ${APEX_SECURITY_REQUIRE_AUTH:-false}
      APEX_CORS_ALLOWED_ORIGINS: ${APEX_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8100,http://localhost:5173,app://localhost,ionic://localhost}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      apex-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

volumes:
  apex_mysql_data:
