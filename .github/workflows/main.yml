name: Apex Gestor 4.0 Enterprise CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apex-gestor-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  security-static:
    name: SecDevOps Static Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js for repository audits
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit committed secrets
        run: node scripts/audit-no-secrets.cjs

      - name: Audit Spring Data JPA conventions
        run: node scripts/audit-spring-data-jpa.cjs

  backend:
    name: Backend Spring Boot
    runs-on: ubuntu-latest
    needs:
      - security-static
    defaults:
      run:
        working-directory: Apex-Gestordemo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Setup Node.js for repository audits
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit Spring Data JPA conventions
        working-directory: .
        run: node scripts/audit-spring-data-jpa.cjs

      - name: Test backend
        run: |
          chmod +x mvnw
          ./mvnw -q test

      - name: Package backend
        run: ./mvnw -q -DskipTests package

  e2e-pdv-stock-envers:
    name: E2E PDV Stock and Envers
    runs-on: ubuntu-latest
    needs:
      - security-static
    defaults:
      run:
        working-directory: Apex-Gestordemo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run PDV stock debit and Envers scenario
        run: |
          chmod +x mvnw
          ./mvnw -q -Dtest=PdvVendaEstoqueEnversIntegrationTests test

  web-client:
    name: Web Cliente Angular
    runs-on: ubuntu-latest
    needs:
      - orchestration
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Runtime dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build secure web client
        run: npm run build:web:client:secure

      - name: Package web client
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          mkdir -p "release-web/App Site Web"
          cp -R dist/apex-gestor/browser/. "release-web/App Site Web/"
          cat > "release-web/App Site Web/LEIA-ME.txt" <<EOF
          Apex Gestor - App Site Web

          Conteudo: build web de producao do e-commerce.
          Para testar no navegador, publique esta pasta em um servidor estatico ou use o artefato direto em um hosting.
          Em desenvolvimento pelo GitHub Codespaces, execute npm run start:web e abra a porta 4200.
          EOF
          cd release-web
          zip -r "apex-gestor-app-site-web-${VERSION_NAME}.zip" "App Site Web"

      - name: Upload web artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apex-web-cliente
          path: Apex_Gestor/release-web/*.zip
          if-no-files-found: error

  orchestration:
    name: Docker Compose DB/API/Web Sync
    runs-on: ubuntu-latest
    needs:
      - backend
      - e2e-pdv-stock-envers
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config

      - name: Start synchronized stack
        run: docker compose -f docker-compose.yml up -d --build apex-mysql apex-rabbitmq apex-backend apex-web

      - name: Wait for database, API and web health
        shell: bash
        run: |
          for attempt in {1..120}; do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"' \
              && curl -fsS http://localhost:4200/healthz >/dev/null \
              && curl -fsS http://localhost:4200/actuator/health | grep -q '"status":"UP"'; then
              exit 0
            fi
            docker compose -f docker-compose.yml ps
            sleep 5
          done
          docker compose -f docker-compose.yml logs --no-color apex-mysql apex-rabbitmq apex-backend apex-web
          exit 1

      - name: Verify API is reachable through security layer
        shell: bash
        run: |
          status="$(curl -sS -o /tmp/apex-produtos-response.txt -w '%{http_code}' http://localhost:8080/api/produtos || true)"
          if [ "$status" != "402" ] && [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected protected API response 402/401/403, got $status"
            cat /tmp/apex-produtos-response.txt || true
            exit 1
          fi

          status="$(curl -sS -o /tmp/apex-license-response.txt -w '%{http_code}' http://localhost:8080/api/licenses/validate \
            -H 'Content-Type: application/json' \
            -d '{"licenseKey":"APEX-DEMO-WEB","deviceFingerprint":"ci-web-device","deviceLabel":"CI Web","platform":"web","appVersion":"ci","appId":"web-client"}')"
          if [ "$status" != "200" ] || ! grep -q '"valid":true' /tmp/apex-license-response.txt; then
            echo "Expected successful license validation, got $status"
            cat /tmp/apex-license-response.txt || true
            exit 1
          fi

          status="$(curl -sS -o /tmp/apex-produtos-licensed-response.txt -w '%{http_code}' http://localhost:8080/api/produtos \
            -H 'X-Apex-License-Key: APEX-DEMO-WEB' \
            -H 'X-Apex-Device-Fingerprint: ci-web-device' \
            -H 'X-Apex-App-Id: web-client' || true)"
          if [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected authenticated API response 401/403 after license check, got $status"
            cat /tmp/apex-produtos-licensed-response.txt || true
            exit 1
          fi

      - name: Stop synchronized stack
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans

  desktop-windows:
    name: Desktop Electron Windows
    runs-on: windows-latest
    needs:
      - orchestration
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Electron installer
        run: npm run build:electron:secure

      - name: Package desktop folder
        shell: pwsh
        run: |
          $versionName = $env:GITHUB_REF_NAME -replace '/', '-'
          $folder = Join-Path "release-desktop" "App Desktop"
          New-Item -ItemType Directory -Force -Path $folder | Out-Null
          $files = Get-ChildItem -Path "release" -File | Where-Object {
            $_.Name -like "*.exe" -or $_.Name -like "*.blockmap" -or $_.Name -like "latest*.yml"
          }
          if (-not $files) {
            throw "Nenhum arquivo desktop encontrado em Apex_Gestor/release."
          }
          Copy-Item -LiteralPath $files.FullName -Destination $folder
          @"
          Apex Gestor - App Desktop

          Conteudo: instalador Windows Electron do PDV/administrativo.
          Execute o arquivo .exe para instalar e abrir o Apex Gestor Desktop.
          "@ | Set-Content -Path (Join-Path $folder "LEIA-ME.txt") -Encoding UTF8
          Compress-Archive -Path $folder -DestinationPath "release-desktop/apex-gestor-app-desktop-$versionName.zip" -Force

      - name: Upload desktop artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apex-desktop-windows
          path: Apex_Gestor/release-desktop/*.zip
          if-no-files-found: error

  mobile-android:
    name: Android APKs Ionic
    runs-on: ubuntu-latest
    needs:
      - orchestration
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under ANDROID_HOME=$ANDROID_HOME ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            find "$SDK_ROOT" -name sdkmanager -type f -maxdepth 5 || true
            exit 1
          fi
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build staff APK
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          npm run build:mobile:staff
          npx capacitor sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleStaffDebug --stacktrace
          cd ..
          mkdir -p release-mobile
          mkdir -p "release-mobile/App Mobile Empresa"
          cp android/app/build/outputs/apk/staff/debug/app-staff-debug.apk "release-mobile/App Mobile Empresa/apex-gestor-mobile-empresa-${VERSION_NAME}.apk"
          cat > "release-mobile/App Mobile Empresa/LEIA-ME.txt" <<EOF
          Apex Gestor - App Mobile Empresa

          Conteudo: APK Android Ionic para funcionarios.
          Instale o .apk em um Android de teste para acessar estoque, vendas rapidas e indicadores.
          EOF
          cd release-mobile
          zip -r "apex-gestor-app-mobile-empresa-${VERSION_NAME}.zip" "App Mobile Empresa"
          cd ..

      - name: Build client APK
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          npm run build:mobile:client
          npx capacitor sync android
          cd android
          ./gradlew assembleClientDebug --stacktrace
          cd ..
          mkdir -p "release-mobile/App Mobile Cliente"
          cp android/app/build/outputs/apk/client/debug/app-client-debug.apk "release-mobile/App Mobile Cliente/apex-gestor-mobile-cliente-${VERSION_NAME}.apk"
          cat > "release-mobile/App Mobile Cliente/LEIA-ME.txt" <<EOF
          Apex Gestor - App Mobile Cliente

          Conteudo: APK Android Ionic para consumidor final.
          Instale o .apk em um Android de teste para acessar loja, carrinho e checkout.
          EOF
          cd release-mobile
          zip -r "apex-gestor-app-mobile-cliente-${VERSION_NAME}.zip" "App Mobile Cliente"
          cd ..

      - name: Upload mobile artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apex-mobile-android
          path: Apex_Gestor/release-mobile/*.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - security-static
      - backend
      - e2e-pdv-stock-envers
      - orchestration
      - web-client
      - desktop-windows
      - mobile-android
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-bundle
          merge-multiple: true

      - name: List release files
        run: find release-bundle -type f -maxdepth 2 -print

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Apex Gestor ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-bundle/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
