name: Apex Gestor 3.0 CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apex-gestor-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  backend:
    name: Backend Spring Boot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apex-Gestordemo
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Test backend
        run: |
          chmod +x mvnw
          ./mvnw -q test

      - name: Package backend
        run: ./mvnw -q -DskipTests package

  web-client:
    name: Web Cliente Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Runtime dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Build secure web client
        run: npm run build:web:client:secure

      - name: Package web client
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          mkdir -p release-web
          cd dist/apex-gestor/browser
          zip -r "../../../release-web/apex-gestor-web-cliente-${VERSION_NAME}.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apex-web-cliente
          path: Apex_Gestor/release-web/*.zip
          if-no-files-found: error

  desktop-windows:
    name: Desktop Electron Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Electron installer
        run: npm run build:electron:secure

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apex-desktop-windows
          path: |
            Apex_Gestor/release/*.exe
            Apex_Gestor/release/*.blockmap
            Apex_Gestor/release/latest*.yml
          if-no-files-found: error

  mobile-android:
    name: Android APKs Ionic
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apex_Gestor
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Apex_Gestor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under ANDROID_HOME=$ANDROID_HOME ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            find "$SDK_ROOT" -name sdkmanager -type f -maxdepth 5 || true
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build staff APK
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          npm run build:mobile:staff
          npx capacitor sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleStaffDebug --stacktrace
          cd ..
          mkdir -p release-mobile
          cp android/app/build/outputs/apk/staff/debug/app-staff-debug.apk "release-mobile/apex-gestor-mobile-empresa-${VERSION_NAME}.apk"

      - name: Build client APK
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME//\//-}"
          npm run build:mobile:client
          npx capacitor sync android
          cd android
          ./gradlew assembleClientDebug --stacktrace
          cd ..
          cp android/app/build/outputs/apk/client/debug/app-client-debug.apk "release-mobile/apex-gestor-mobile-cliente-${VERSION_NAME}.apk"

      - name: Upload mobile artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apex-mobile-android
          path: Apex_Gestor/release-mobile/*.apk
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - backend
      - web-client
      - desktop-windows
      - mobile-android
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-bundle
          merge-multiple: true

      - name: List release files
        run: find release-bundle -type f -maxdepth 2 -print

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Apex Gestor ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-bundle/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
