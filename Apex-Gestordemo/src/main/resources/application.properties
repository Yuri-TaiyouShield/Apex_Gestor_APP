spring.application.name=Apex-Gestordemo

# Banco de dados parametrizado por ambiente. Nunca versionar senha real.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:2705/apex_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Driver do banco (geralmente detectado automaticamente)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool e JPA: defaults seguros para desenvolvimento, ajustaveis em producao.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Observabilidade e readiness para Docker/Codespaces/CI.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
server.compression.enabled=true
server.error.include-stacktrace=never
server.error.include-message=never

# Seguranca. Em desenvolvimento fica permissivo para preservar demos legadas.
# Em producao, usar APEX_SECURITY_REQUIRE_AUTH=true e credenciais/roles reais.
apex.security.require-auth=${APEX_SECURITY_REQUIRE_AUTH:false}
apex.security.cors.allowed-origins=${APEX_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8100,http://localhost:5173,app://localhost,ionic://localhost}
