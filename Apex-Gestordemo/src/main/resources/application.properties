spring.application.name=Apex-Gestordemo

# Porta da API. Se Tomcat ou GlassFish externos estiverem usando 8080,
# suba o Apex com SERVER_PORT=8082, por exemplo.
server.port=${SERVER_PORT:8080}

# Banco de dados MySQL. Em desenvolvimento, use o docker-compose.yml da raiz do repo.
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:2705}/${DB_NAME:apex_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=utf8&useUnicode=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:apex_dev_2026}

# Driver do banco (geralmente detectado automaticamente)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_JDBC_BATCH_SIZE:50}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.initialization-fail-timeout=${DB_INITIALIZATION_FAIL_TIMEOUT_MS:30000}
spring.datasource.hikari.connection-test-query=SELECT 1

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

server.forward-headers-strategy=framework

# Use um segredo forte via variavel de ambiente em producao.
apex.security.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-with-at-least-32-bytes}
apex.security.jwt.issuer=${JWT_ISSUER:apex-gestor}
apex.security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
apex.security.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:30}
apex.security.require-https=${REQUIRE_HTTPS:false}
apex.privacy.hash-pepper=${PRIVACY_HASH_PEPPER:dev-only-change-this-privacy-pepper}
# Catalogo de licencas: CHAVE|apps|limite_dispositivos|validade_dias;...
# Apps aceitos: desktop, mobile-staff, mobile-client, web-client ou all.
apex.license.catalog=${APEX_LICENSE_CATALOG:APEX-DEMO-ALL|all|3|30;APEX-DEMO-DESKTOP|desktop|1|30;APEX-DEMO-EMPRESA|mobile-staff|1|30;APEX-DEMO-CLIENTE|mobile-client|1|30;APEX-DEMO-WEB|web-client|1|30;APEX-DEMO-DUO|desktop+mobile-staff|2|30;APEX-DEMO-TRIO|desktop+mobile-staff+web-client|3|30}
apex.license.allowed-keys=${APEX_LICENSE_KEYS:APEX-DEMO-2026}
apex.license.max-devices-per-key=${APEX_LICENSE_MAX_DEVICES:3}
apex.license.validity-days=${APEX_LICENSE_VALIDITY_DAYS:30}
