<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apex Gestor - Desktop PDV sem download</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      color: #102033;
      background: #eef3f8;
    }
    header {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }
    a {
      color: #0b4b55;
      font-weight: 700;
      text-decoration: none;
    }
    .desktop {
      width: min(1180px, 100%);
      min-height: min(760px, calc(100vh - 110px));
      margin: 0 auto;
      border: 10px solid #172033;
      border-top-width: 34px;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(16, 32, 51, .22);
      position: relative;
    }
    .desktop::before {
      content: "";
      position: absolute;
      top: -22px;
      left: 14px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 18px 0 #f59e0b, 36px 0 #22c55e;
      z-index: 2;
    }
    iframe {
      width: 100%;
      height: 100%;
      min-height: inherit;
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Desktop / PDV - simulação em navegador</h1>
    <a href="./">Voltar</a>
  </header>
  <main class="desktop" aria-label="Simulador do app desktop PDV">
    <iframe title="Apex Gestor Desktop PDV" src="../?demo=pdv&surface=desktop"></iframe>
  </main>
</body>
</html>
