<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apex Gestor - Mobile Empresa sem download</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      gap: 18px;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      color: #102033;
      background: #eef3f8;
    }
    header {
      width: min(430px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0;
    }
    a {
      color: #0b4b55;
      font-weight: 700;
      text-decoration: none;
    }
    .phone {
      width: min(390px, 100%);
      aspect-ratio: 390 / 844;
      border: 14px solid #172033;
      border-radius: 34px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(16, 32, 51, .28);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mobile Empresa - simulação em navegador</h1>
    <a href="./">Voltar</a>
  </header>
  <main class="phone" aria-label="Simulador do app mobile empresa">
    <iframe title="Apex Gestor Mobile Empresa" src="../?demo=empresa&surface=mobile"></iframe>
  </main>
</body>
</html>
